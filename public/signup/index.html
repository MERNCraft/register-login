<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <style>
    body { 
      min-height: 100vh;
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    form {
      width: 12em;
      background-color: #222;
      color: #ddd;
      padding: 1em;
      border-radius: 1em;
    }
    label {
      display: block;
      margin-bottom: 1em;
    }
    span {
      display: block;
      width: 5em;
    }
    input:invalid {
      border: 1px solid #f00;
    }
    form:invalid button {
      pointer-events: none;
      opacity: 0.25;
    }
  </style> 
</head>

<body>
  <form
    id="register"
  >
    <label for="username">
      <span>Username:</span>
      <input
        type="text"
        id="username"
        name="username"
        value=""
        required
      />
    </label>
    <label for="email">
      <span>Email:</span>
      <input
        type="email"
        id="email"
        name="email"
        value=""
        required
      />
    </label>
    <label for="password">
      <span>Password:</span>
      <input
        type="password"
        id="password"
        name="password"
        value=""
        required
      />
    </label>
    <button
      type="submit"
    >
      Register
    </button>
  </form>

  <script>
  ;(function () {
    "use strict"
    const url = "http://localhost:5555/signup"
    const form = document.getElementById("register")

    form.onsubmit = event => {
      event.preventDefault()
      const formData = new FormData(form)
      const body = JSON.stringify(
        Object.fromEntries(formData)
      )    
      
      const options = {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body,
      }

      fetch(url, options)
        .then(response => response.json())
        .then(json => console.log("fetch response:", json))
        .catch(error => console.log("error:", error))
    }
  })()
  </script> 
</body>
</html>
